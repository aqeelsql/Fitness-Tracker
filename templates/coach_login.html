{% extends 'base.html' %}

{% block title %}Coach Access - Fitness Tracker{% endblock %}

{% block content %}
<div class="login-container">
    <div class="coach-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        </svg>
    </div>
    
    <h2 class="login-title">Coach's Corner</h2>
    <p class="login-subtitle">Authorized Personnel Only</p>
    
    <form method="POST" class="login-form">
        <div class="form-group">
            <label for="password" class="form-label">Access Code</label>
            <input type="password" 
                   class="form-control fitness-input" 
                   id="password" 
                   name="password" 
                   placeholder="Enter access code..."
                   required>
        </div>
        
        <button type="submit" class="btn btn-login">
            <span>Enter Dashboard</span>
        </button>
    </form>
    
    <a href="{{ url_for('front_stage') }}" class="back-link">← Return to Workout Log</a>
</div>
{% endblock %}
