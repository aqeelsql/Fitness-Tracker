version: '3'
services:
  flask_app:
    image: python:3.11-slim
    container_name: jenkins_fitness_app
    working_dir: /app
    volumes:
      - /var/lib/jenkins/.jenkins/workspace/fitness-tracker-pipeline:/app
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      - FLASK_APP=application.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_ENV=production
    command: >
      sh -c "pip install -r requirements.txt --quiet &&
             flask run --host=0.0.0.0 --port=5000"
    restart: always
